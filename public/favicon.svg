<?xml version="1.0" encoding="UTF-8"?>
<!--
  Nullpath favicon — chunky pixel-art "N" with a blinking-underscore-style
  bar underneath. Reads at 16×16 because the strokes are 4 SVG-units wide
  (out of a 32-unit viewBox), which renders as 2-pixel strokes at 16×16.
  Rendered on a deep-void background (#07091a) matching the app theme.

  Built as <rect> primitives only — no fonts to embed, scales perfectly,
  works as the inline favicon source for modern browsers.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background -->
  <rect width="32" height="32" fill="#07091a" rx="3" />

  <!-- Subtle chunky pixel border (1px inside the rounded rect) -->
  <rect
    x="1.5"
    y="1.5"
    width="29"
    height="29"
    fill="none"
    stroke="#3a4480"
    stroke-width="1"
    rx="2"
  />

  <!-- The "N" — three rects forming the letter, in cyan -->
  <!-- Left vertical stroke -->
  <rect x="7" y="7" width="4" height="14" fill="#5cf2ff" />
  <!-- Diagonal — approximated as a rotated rect for crispness at 16×16 -->
  <rect
    x="11"
    y="7"
    width="4"
    height="20"
    fill="#5cf2ff"
    transform="rotate(-35 13 17)"
  />
  <!-- Right vertical stroke (in magenta for the gradient feel) -->
  <rect x="21" y="7" width="4" height="14" fill="#ff66e0" />

  <!-- Blinking-underscore bar — the project's signature -->
  <rect x="7" y="24" width="18" height="2" fill="#a8ff5c" />
</svg>
