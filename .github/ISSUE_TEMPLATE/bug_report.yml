name: Bug report
description: Something is broken or behaves unexpectedly
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Please give us enough info to reproduce
        it on our side — most "won't repro" closures come from missing
        OS / version / steps detail.

  - type: input
    id: version
    attributes:
      label: Nullpath version
      description: From the bottom of the sidebar (e.g. `v0.21.0-beta.1`)
      placeholder: v0.21.0-beta.1
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows
        - macOS
        - Linux (X11)
        - Linux (Wayland)
        - Other
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug. Include screenshots if it's visual.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open the app
        2. Navigate to ...
        3. Click on ...
        4. See ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Any console errors?
      description: Open the dev tools (Ctrl+Shift+I) and paste anything red.
      render: shell
