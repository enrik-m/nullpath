<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Primary -->
    <title>Nullpath — Gamified offsec career atlas</title>
    <meta
      name="description"
      content="Turn your offensive-security learning into visible progress. 23 zones, 820 verified web-pentest skills, OWASP / CWE tagged, 56 trophies, browser-native and local-first."
    />
    <meta name="theme-color" content="#07091a" />
    <meta name="color-scheme" content="dark" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Open Graph (Facebook, Discord, LinkedIn previews, etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Nullpath — Gamified offsec career atlas" />
    <meta
      property="og:description"
      content="Turn your offensive-security learning into visible progress. 23 zones, 820 verified web-pentest skills, OWASP / CWE tagged, 56 trophies, browser-native and local-first."
    />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Nullpath logo + tagline + zone/node/trophy stats" />
    <meta property="og:site_name" content="Nullpath" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Nullpath — Gamified offsec career atlas" />
    <meta
      name="twitter:description"
      content="23 zones, 820 verified web-pentest skills, OWASP / CWE tagged, 56 trophies. Browser-native, local-first, no signup."
    />
    <meta name="twitter:image" content="/og-image.png" />

    <!-- Robots -->
    <meta name="robots" content="index, follow" />

    <!-- Mobile fullscreen-ish behavior on iOS once added to home screen -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Nullpath" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

</html>
